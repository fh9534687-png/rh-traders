<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #020617;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        border: 1px solid rgba(56, 189, 248, 0.2);
        background: rgba(2, 6, 23, 0.7);
        border-radius: 20px;
        padding: 20px 18px;
      }
      h1 {
        font-size: 20px;
        margin: 0;
      }
      p {
        margin: 10px 0 0;
        line-height: 1.6;
        color: rgba(226, 232, 240, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>
        RH Traders can’t reach the network right now. Check your connection and try again.
      </p>
    </div>
  </body>
</html>
