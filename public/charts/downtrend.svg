<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520">
      <stop stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#120000"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <g opacity="0.7">
    <path d="M110 430H1090" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M110 330H1090" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M110 230H1090" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M110 130H1090" stroke="#FFFFFF" stroke-opacity="0.06"/>
  </g>
  <g filter="url(#glow)">
    <path d="M140 110 C 260 170, 320 150, 420 220 C 520 290, 590 260, 680 320 C 770 380, 850 350, 930 400 C 1010 450, 1050 440, 1080 460" stroke="#FF1A1A" stroke-opacity="0.9" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="90" y="70" fill="white" fill-opacity="0.90" font-family="Inter, Arial" font-size="22" font-weight="700">
    Downtrend (Lower Highs + Lower Lows)
