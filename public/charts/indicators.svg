<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520">
      <stop stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <g opacity="0.75">
    <path d="M90 120H1110" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M90 200H1110" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M90 280H1110" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M90 360H1110" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M90 440H1110" stroke="#FFFFFF" stroke-opacity="0.06"/>
  </g>

  <!-- price line -->
  <g filter="url(#glow)">
    <path d="M130 360 C 220 320, 280 340, 360 290 C 450 235, 520 270, 610 220 C 700 170, 770 210, 860 160 C 940 120, 1010 140, 1080 98" stroke="#FF1A1A" stroke-opacity="0.75" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- moving average -->
  <path d="M130 380 C 230 350, 300 360, 380 320 C 470 270, 540 292, 630 250 C 720 208, 790 232, 880 190 C 960 155, 1020 165, 1080 135" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>

  <!-- RSI panel -->
  <rect x="110" y="370" width="980" height="120" rx="18" fill="#000000" fill-opacity="0.25" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <path d="M140 460 C 220 430, 290 470, 360 445 C 430 420, 500 455, 580 430 C 660 405, 720 440, 800 415 C 880 390, 980 410, 1060 392" stroke="#34D399" stroke-opacity="0.8" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 410H1060" stroke="#FFFFFF" stroke-opacity="0.10" stroke-dasharray="8 8"/>
  <text x="140" y="398" fill="white" fill-opacity="0.75" font-family="Inter, Arial" font-size="14" font-weight="700">RSI</text>

  <text x="90" y="70" fill="white" fill-opacity="0.90" font-family="Inter, Arial" font-size="22" font-weight="700">
    Indicators: Moving Averages + RSI (Example)
  </text>
</svg>

