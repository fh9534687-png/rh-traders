<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="3D laptop mockup with trading chart">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#87ceeb" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#ff6a00" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#87ceeb" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="18"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="800" fill="url(#g1)"/>
  <rect x="0" y="0" width="1200" height="800" fill="url(#screenGlow)"/>

  <!-- laptop group -->
  <g filter="url(#softShadow)" transform="translate(150,120)">
    <!-- screen -->
    <g transform="skewX(-9)">
      <rect x="160" y="40" width="660" height="420" rx="26" fill="#020617" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <rect x="182" y="62" width="616" height="376" rx="20" fill="#070b14"/>
      <!-- screen header -->
      <rect x="182" y="62" width="616" height="42" rx="20" fill="rgba(255,255,255,0.05)"/>
      <circle cx="210" cy="83" r="6" fill="#ef4444" opacity="0.9"/>
      <circle cx="232" cy="83" r="6" fill="#f59e0b" opacity="0.9"/>
      <circle cx="254" cy="83" r="6" fill="#22c55e" opacity="0.9"/>
      <text x="490" y="90" font-family="system-ui,Segoe UI,Arial" font-weight="800" font-size="14" fill="rgba(226,232,240,0.75)" letter-spacing="4">RH TRADERS</text>

      <!-- chart grid -->
      <g opacity="0.18">
        <path d="M210 140H770M210 200H770M210 260H770M210 320H770M210 380H770" stroke="#94a3b8" stroke-width="1"/>
        <path d="M250 120V420M330 120V420M410 120V420M490 120V420M570 120V420M650 120V420M730 120V420" stroke="#94a3b8" stroke-width="1"/>
      </g>

      <!-- glowing price line -->
      <path filter="url(#glow)" d="M210 360 C260 310, 300 340, 340 280 C390 200, 430 240, 470 210 C520 170, 570 220, 610 170 C660 110, 700 170, 770 130"
            fill="none" stroke="#87ceeb" stroke-width="4" stroke-linecap="round"/>
      <path d="M210 365 C260 320, 300 350, 340 290 C390 215, 430 250, 470 220 C520 182, 570 232, 610 182 C660 124, 700 182, 770 142"
            fill="none" stroke="#ff6a00" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>

      <!-- stat chips -->
      <g>
        <rect x="210" y="118" width="140" height="34" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
        <text x="230" y="140" font-family="system-ui,Segoe UI,Arial" font-size="12" font-weight="800" fill="rgba(248,250,252,0.88)">BTC $62,350</text>
        <rect x="364" y="118" width="96" height="34" rx="16" fill="rgba(34,197,94,0.14)" stroke="rgba(34,197,94,0.25)"/>
        <text x="386" y="140" font-family="system-ui,Segoe UI,Arial" font-size="12" font-weight="900" fill="#bbf7d0">+3.8%</text>
      </g>
    </g>

    <!-- keyboard base -->
    <g transform="translate(50,460) skewX(-9)">
      <path d="M150 0H920l110 170H40L150 0Z" fill="url(#metal)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <path d="M90 70H930" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
      <!-- touchpad -->
      <rect x="455" y="90" width="170" height="88" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <!-- key hints -->
      <g opacity="0.18">
        <rect x="120" y="90" width="290" height="18" rx="8" fill="#fff"/>
        <rect x="120" y="120" width="330" height="18" rx="8" fill="#fff"/>
        <rect x="120" y="150" width="260" height="18" rx="8" fill="#fff"/>
        <rect x="650" y="90" width="260" height="18" rx="8" fill="#fff"/>
        <rect x="650" y="120" width="220" height="18" rx="8" fill="#fff"/>
        <rect x="650" y="150" width="290" height="18" rx="8" fill="#fff"/>
      </g>
    </g>
  </g>
</svg>

