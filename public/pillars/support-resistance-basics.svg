<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720">
      <stop stop-color="#020617" />
      <stop offset="1" stop-color="#0B1224" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.85" />
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="720" rx="36" fill="url(#bg)" />

  <!-- Subtle grid -->
  <g opacity="0.75">
    <path d="M140 600H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 480H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 360H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 240H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 120H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
  </g>

  <!-- Support / resistance zones -->
  <g>
    <rect x="180" y="430" width="1110" height="70" rx="20" fill="#38BDF8" fill-opacity="0.10" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="2" />
    <rect x="180" y="210" width="1110" height="70" rx="20" fill="#2563EB" fill-opacity="0.08" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="2" />
  </g>

  <!-- Price path -->
  <g filter="url(#glow)">
    <path
      d="M210 500 C 290 460, 330 470, 410 430 C 510 380, 560 400, 640 360 C 720 320, 780 330, 860 280 C 940 235, 980 255, 1060 220 C 1160 178, 1215 190, 1280 160"
      stroke="url(#accent)"
      stroke-opacity="0.95"
      stroke-width="9"
      stroke-linecap="round"
    />
  </g>

  <!-- Reactions -->
  <g>
    <circle cx="410" cy="430" r="10" fill="#38BDF8" fill-opacity="0.95" />
    <circle cx="640" cy="360" r="10" fill="#38BDF8" fill-opacity="0.95" />
    <circle cx="1060" cy="220" r="10" fill="#38BDF8" fill-opacity="0.95" />
  </g>

  <!-- Labels -->
  <g>
    <rect x="74" y="62" width="820" height="56" rx="18" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="104" y="100" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="800">
      Support &amp; Resistance: floors, ceilings, and reactions
    </text>

    <text x="205" y="255" fill="white" fill-opacity="0.92" font-family="Inter, Arial" font-size="18" font-weight="800">
      RESISTANCE ZONE
    </text>
    <text x="205" y="475" fill="white" fill-opacity="0.92" font-family="Inter, Arial" font-size="18" font-weight="800">
      SUPPORT ZONE
    </text>
  </g>
</svg>

