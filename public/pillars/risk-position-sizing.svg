<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720">
      <stop stop-color="#020617" />
      <stop offset="1" stop-color="#0B1224" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="720" rx="36" fill="url(#bg)" />

  <!-- Card -->
  <g filter="url(#glow)">
    <rect x="170" y="150" width="1060" height="420" rx="28" fill="#0B1224" fill-opacity="0.55" stroke="#38BDF8" stroke-opacity="0.45" stroke-width="3" />
  </g>

  <!-- Formula -->
  <g>
    <text x="220" y="230" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="26" font-weight="900">
      Position size formula (beginner-friendly)
    </text>
    <text x="220" y="280" fill="white" fill-opacity="0.75" font-family="Inter, Arial" font-size="18" font-weight="700">
      1) Decide account risk per trade (e.g. 1%)
    </text>
    <text x="220" y="320" fill="white" fill-opacity="0.75" font-family="Inter, Arial" font-size="18" font-weight="700">
      2) Measure stop distance (entry to stop)
    </text>
    <text x="220" y="360" fill="white" fill-opacity="0.75" font-family="Inter, Arial" font-size="18" font-weight="700">
      3) Size = Risk ÷ Stop Distance
    </text>

    <rect x="220" y="400" width="960" height="120" rx="22" fill="#020617" fill-opacity="0.75" stroke="#38BDF8" stroke-opacity="0.28" />
    <text x="260" y="450" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="900">
      Example
    </text>
    <text x="260" y="490" fill="white" fill-opacity="0.78" font-family="Inter, Arial" font-size="18" font-weight="700">
      Account = $1,000 • Risk = 1% ($10) • Stop = 2% away
    </text>
    <text x="260" y="528" fill="white" fill-opacity="0.9" font-family="Inter, Arial" font-size="20" font-weight="900">
      Position size ≈ $10 ÷ 0.02 = $500
    </text>
  </g>

  <g>
    <rect x="74" y="62" width="740" height="56" rx="18" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="104" y="100" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="800">
      Position sizing: keep losses consistent
    </text>
  </g>
</svg>

