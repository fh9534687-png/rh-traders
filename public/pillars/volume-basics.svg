    <rect x="484" y="520" width="28" height="150" rx="8" fill="#38BDF8" fill-opacity="0.48" />
    <rect x="526" y="590" width="28" height="80" rx="8" fill="#38BDF8" fill-opacity="0.26" />
    <rect x="568" y="505" width="28" height="165" rx="8" fill="#38BDF8" fill-opacity="0.55" />
    <rect x="610" y="575" width="28" height="95" rx="8" fill="#38BDF8" fill-opacity="0.3" />
    <rect x="652" y="470" width="28" height="200" rx="8" fill="#38BDF8" fill-opacity="0.62" />
    <rect x="694" y="540" width="28" height="130" rx="8" fill="#38BDF8" fill-opacity="0.34" />
    <rect x="736" y="455" width="28" height="215" rx="8" fill="#38BDF8" fill-opacity="0.68" />
    <rect x="778" y="535" width="28" height="135" rx="8" fill="#38BDF8" fill-opacity="0.36" />
    <rect x="820" y="430" width="28" height="240" rx="8" fill="#38BDF8" fill-opacity="0.72" />
    <rect x="862" y="515" width="28" height="155" rx="8" fill="#38BDF8" fill-opacity="0.4" />
