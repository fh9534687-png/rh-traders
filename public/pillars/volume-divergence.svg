<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720">
      <stop stop-color="#020617" />
      <stop offset="1" stop-color="#0B1224" />
    </linearGradient>
    <linearGradient id="price" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.85" />
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="720" rx="36" fill="url(#bg)" />

  <g opacity="0.75">
    <path d="M140 120H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 240H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 360H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 480H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 600H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
  </g>

  <!-- Price rising -->
  <g filter="url(#glow)">
    <path
      d="M190 430 C 310 360, 360 400, 480 330 C 600 265, 660 300, 780 240 C 900 180, 980 220, 1100 165 C 1200 125, 1240 145, 1290 120"
      stroke="url(#price)"
      stroke-opacity="0.95"
      stroke-width="9"
      stroke-linecap="round"
    />
  </g>

  <!-- Volume falling -->
  <g>
    <rect x="210" y="450" width="30" height="220" rx="8" fill="#38BDF8" fill-opacity="0.72" />
    <rect x="255" y="470" width="30" height="200" rx="8" fill="#38BDF8" fill-opacity="0.66" />
    <rect x="300" y="490" width="30" height="180" rx="8" fill="#38BDF8" fill-opacity="0.6" />
    <rect x="345" y="510" width="30" height="160" rx="8" fill="#38BDF8" fill-opacity="0.55" />
    <rect x="390" y="525" width="30" height="145" rx="8" fill="#38BDF8" fill-opacity="0.5" />
    <rect x="435" y="540" width="30" height="130" rx="8" fill="#38BDF8" fill-opacity="0.44" />
    <rect x="480" y="555" width="30" height="115" rx="8" fill="#38BDF8" fill-opacity="0.4" />
    <rect x="525" y="565" width="30" height="105" rx="8" fill="#38BDF8" fill-opacity="0.36" />
    <rect x="570" y="578" width="30" height="92" rx="8" fill="#38BDF8" fill-opacity="0.33" />
    <rect x="615" y="590" width="30" height="80" rx="8" fill="#38BDF8" fill-opacity="0.3" />
    <rect x="660" y="600" width="30" height="70" rx="8" fill="#38BDF8" fill-opacity="0.28" />
    <rect x="705" y="608" width="30" height="62" rx="8" fill="#38BDF8" fill-opacity="0.26" />
    <rect x="750" y="615" width="30" height="55" rx="8" fill="#38BDF8" fill-opacity="0.24" />
    <rect x="795" y="622" width="30" height="48" rx="8" fill="#38BDF8" fill-opacity="0.22" />
  </g>

  <!-- Divergence label -->
  <g>
    <rect x="74" y="62" width="760" height="56" rx="18" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="104" y="100" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="800">
      Volume divergence: price up, volume down
    </text>
    <rect x="960" y="340" width="330" height="108" rx="22" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="985" y="380" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="18" font-weight="900">
      Warning sign
    </text>
    <text x="985" y="408" fill="white" fill-opacity="0.72" font-family="Inter, Arial" font-size="15" font-weight="700">
      Momentum may be weakening
    </text>
  </g>
</svg>

