<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720">
      <stop stop-color="#020617" />
      <stop offset="1" stop-color="#0B1224" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="720" rx="36" fill="url(#bg)" />

  <!-- Risk/Reward bars -->
  <g filter="url(#glow)">
    <rect x="210" y="250" width="980" height="300" rx="28" fill="#0B1224" fill-opacity="0.55" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="3" />
  </g>

  <g>
    <text x="260" y="320" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="26" font-weight="900">
      Risk-to-Reward (R:R)
    </text>
    <text x="260" y="360" fill="white" fill-opacity="0.72" font-family="Inter, Arial" font-size="18" font-weight="700">
      Compare potential loss vs potential gain before you enter.
    </text>

    <rect x="260" y="410" width="320" height="34" rx="12" fill="#38BDF8" fill-opacity="0.35" />
    <text x="595" y="435" fill="white" fill-opacity="0.85" font-family="Inter, Arial" font-size="18" font-weight="900">
      Risk = 1x
    </text>

    <rect x="260" y="470" width="760" height="34" rx="12" fill="#2563EB" fill-opacity="0.40" />
    <text x="1035" y="495" fill="white" fill-opacity="0.92" font-family="Inter, Arial" font-size="18" font-weight="900">
      Reward = 3x
    </text>

    <text x="260" y="540" fill="white" fill-opacity="0.9" font-family="Inter, Arial" font-size="20" font-weight="900">
      Example: risk $10 to make $30 → 1:3
    </text>
  </g>

  <g>
    <rect x="74" y="62" width="740" height="56" rx="18" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="104" y="100" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="800">
      Risk-to-reward: win less, profit more
    </text>
  </g>
</svg>

