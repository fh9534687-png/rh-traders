<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720">
      <stop stop-color="#020617" />
      <stop offset="1" stop-color="#0B1224" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" stop-opacity="0.85" />
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="720" rx="36" fill="url(#bg)" />

  <g opacity="0.75">
    <path d="M140 600H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 480H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 360H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 240H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
    <path d="M140 120H1260" stroke="#FFFFFF" stroke-opacity="0.06" />
  </g>

  <!-- Old resistance -->
  <g>
    <rect x="180" y="260" width="1110" height="60" rx="18" fill="#38BDF8" fill-opacity="0.10" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="2" />
    <text x="205" y="298" fill="white" fill-opacity="0.9" font-family="Inter, Arial" font-size="18" font-weight="800">
      OLD RESISTANCE
    </text>
  </g>

  <!-- Breakout + retest -->
  <g filter="url(#glow)">
    <path
      d="M210 520 C 320 470, 360 495, 470 440 C 600 375, 660 405, 760 330 C 840 270, 900 295, 970 245 C 1040 200, 1100 215, 1160 185 C 1215 165, 1250 175, 1290 155"
      stroke="url(#accent)"
      stroke-opacity="0.95"
      stroke-width="9"
      stroke-linecap="round"
    />
    <path
      d="M970 245 C 1030 260, 1080 295, 1120 320 C 1160 345, 1210 330, 1250 305"
      stroke="#60A5FA"
      stroke-opacity="0.85"
      stroke-width="8"
      stroke-linecap="round"
    />
    <path
      d="M1250 305 C 1210 275, 1180 250, 1150 235 C 1120 220, 1080 225, 1040 235"
      stroke="#38BDF8"
      stroke-opacity="0.9"
      stroke-width="8"
      stroke-linecap="round"
    />
  </g>

  <!-- New support highlight -->
  <g>
    <rect x="980" y="255" width="310" height="70" rx="22" fill="#2563EB" fill-opacity="0.10" stroke="#7DD3FC" stroke-opacity="0.55" stroke-width="2" />
    <text x="1005" y="297" fill="white" fill-opacity="0.92" font-family="Inter, Arial" font-size="18" font-weight="900">
      RETEST = NEW SUPPORT
    </text>
  </g>

  <g>
    <rect x="74" y="62" width="720" height="56" rx="18" fill="#0B1224" stroke="#38BDF8" stroke-opacity="0.35" />
    <text x="104" y="100" fill="white" fill-opacity="0.95" font-family="Inter, Arial" font-size="22" font-weight="800">
      Role reversal: resistance breaks → becomes support
    </text>
  </g>
</svg>

